services:
  db:
    image: postgres:16-alpine
    container_name: terra_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-terra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terra_pass}
      POSTGRES_DB: ${POSTGRES_DB:-terra_da_esperanca}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-terra_user} -d ${POSTGRES_DB:-terra_da_esperanca}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    container_name: terra_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-terra_user}:${POSTGRES_PASSWORD:-terra_pass}@db:5432/${POSTGRES_DB:-terra_da_esperanca}
      SECRET_KEY: ${SECRET_KEY:-troque-esta-chave-em-producao}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    container_name: terra_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
